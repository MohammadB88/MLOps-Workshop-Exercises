# MkDocs configuration file
site_name: MLOps Workshop
copyright: Copyright & copy; Mohammad Bahmani 2026

theme:
  name: material
  custom_dir: docs/assets/overrides

  # font: 
  #   text: Merriweather Sans
  #   code: Red Hat Mono
  
  icon:
    repo: fontawesome/brands/github
    admonition:
      example: octicons/terminal-24

  logo: assets/images/mlops-workshop-icon.jpeg
  language: en
  favicon: assets/images/mlops-workshop-icon.jpeg

  features:
    - content.code.annotate
    - content.code.copy
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - Navigation.footer
    - search.highlight
    - search.suggest

  palette:    
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: green
      accent: deep purple
    
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
        - abbreviations.md
      base_path:
        - .
        - docs/theory
        - docs/labs-docs/snippets
        - docs/labs-docs/bike-forecasting
        - docs/labs-docs/bike-forecasting/snippets
        - docs/labs-docs/02_intermediate/llm-instruction-tuning
        # - docs/automation-platform/snippets
        # - docs/projects/cloud-automation/snippets
        # - docs/projects/linux-automation/snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      title: On this page

# Add Repo URL and Repo Name
repo_url: https://github.com/MohammadB88/MLOps-Workshop-Exercises.git
repo_name: mohammad/mlops-workshop-exercises

# Add links to my social accounts
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MohammadB88/MLOps-Workshop-Exercises.git
      name: Project in Github
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/mohammad-bahmani-ph-d-03810978/
      name: LinkedIn Profile

extra_css:
  - assets/stylesheets/tables.css

extra_javascript:
  - assets/javascripts/extra/refresh-on-toggle-dark-light.js
  - assets/javascripts/extra/tablesort.min.js
  - assets/javascripts/extra/tablesort.js


