apiVersion: apps/v1
kind: Deployment
metadata:
  name: bike-demand-prediction
  labels:
    app: bike-demand-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bike-demand-prediction
  template:
    metadata:
      labels:
        app: bike-demand-prediction
    spec:
      containers:
      - name: bike-demand-prediction
        image: bike-demand-prediction:latest
        ports:
        - containerPort: 8080
        env:
        - name: MODEL_PATH
          value: "/app/model"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bike-demand-prediction-service
  labels:
    app: bike-demand-prediction
spec:
  selector:
    app: bike-demand-prediction
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP